spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: UtsavHikariPool-prod
      maximum-pool-size: 20
      minimum-idle: 10

  jpa:
    show-sql: false

logging:
  level:
    dev.utsav: INFO
    org.hibernate.SQL: WARN